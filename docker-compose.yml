version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: talentcopilot_postgres
    environment:
      POSTGRES_DB: talentcopilot
      POSTGRES_USER: talentcopilot
      POSTGRES_PASSWORD: talentcopilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U talentcopilot" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: talentcopilot_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: talentcopilot_celery
    command: >
      celery -A app.infrastructure.jobs.celery_app worker --loglevel=info -Q ingestion,parsing,default --concurrency=2
    environment:
      - DATABASE_URL=postgresql+asyncpg://talentcopilot:talentcopilot@postgres:5432/talentcopilot
      - DATABASE_URL_SYNC=postgresql+psycopg2://talentcopilot:talentcopilot@postgres:5432/talentcopilot
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: talentcopilot_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://talentcopilot:talentcopilot@postgres:5432/talentcopilot
      - DATABASE_URL_SYNC=postgresql+psycopg2://talentcopilot:talentcopilot@postgres:5432/talentcopilot
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-secret_development_key}
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: talentcopilot_frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://api:8000
    volumes:
      - ./frontend:/app
    depends_on:
      - api
    restart: unless-stopped

  flower:
    image: mher/flower:2.0
    container_name: talentcopilot_flower
    command: celery flower --broker=redis://redis:6379/0 --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
